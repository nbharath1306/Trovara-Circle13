services:
  - type: web
    name: trovara-web
    runtime: python
    plan: free
    region: singapore
    branch: main
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn trovara.wsgi --log-file -"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: trovara-web.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
